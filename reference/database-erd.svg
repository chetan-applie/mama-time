<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">MAMA TIME PostgreSQL entity relationship diagram</title>
  <desc id="desc">Tables admins, app_settings, leads, lead_activities and schema_migrations with foreign key relationships.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#151719"/><stop offset="1" stop-color="#242022"/></linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eaa0a3"/><stop offset="1" stop-color="#bd737b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".25"/></filter>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#fff}.sub{font:400 17px Arial,sans-serif;fill:#d8d2d0}.table{fill:#fffaf6;stroke:#e8c5bd;stroke-width:2;rx:18;filter:url(#shadow)}.head{fill:url(#rose)}.th{font:700 20px Arial,sans-serif;fill:#fff}.field{font:400 15px Arial,sans-serif;fill:#282326}.key{font:700 15px Arial,sans-serif;fill:#9b565d}.small{font:400 13px Arial,sans-serif;fill:#655c5a}.rel{fill:none;stroke:#e3b862;stroke-width:4}.rel2{fill:none;stroke:#d98c94;stroke-width:4;stroke-dasharray:8 7}.label{font:700 14px Arial,sans-serif;fill:#f2d38b}.foot{font:400 14px Arial,sans-serif;fill:#d8d2d0}
    </style>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <text x="70" y="66" class="title">MAMA TIME · PostgreSQL Database Schema</text>
  <text x="70" y="98" class="sub">Production data model · Version 2.1.0 · Sentinators Gym</text>

  <!-- admins -->
  <g transform="translate(70 160)">
    <rect class="table" width="330" height="310"/>
    <path class="head" d="M18 0h294a18 18 0 0 1 18 18v54H0V18A18 18 0 0 1 18 0z"/>
    <text x="24" y="45" class="th">admins</text>
    <text x="24" y="102" class="key">PK  id · BIGSERIAL</text>
    <text x="24" y="132" class="field">email · unique</text>
    <text x="24" y="162" class="field">password_hash</text>
    <text x="24" y="192" class="field">display_name · role</text>
    <text x="24" y="222" class="field">active · auth_version</text>
    <text x="24" y="252" class="field">created_at · updated_at</text>
    <text x="24" y="282" class="field">last_login_at</text>
  </g>

  <!-- settings -->
  <g transform="translate(70 535)">
    <rect class="table" width="330" height="220"/>
    <path class="head" d="M18 0h294a18 18 0 0 1 18 18v54H0V18A18 18 0 0 1 18 0z"/>
    <text x="24" y="45" class="th">app_settings</text>
    <text x="24" y="105" class="key">PK  key · VARCHAR(100)</text>
    <text x="24" y="140" class="field">value · TEXT</text>
    <text x="24" y="175" class="field">updated_at · TIMESTAMPTZ</text>
    <text x="24" y="205" class="small">Editable campaign and contact settings</text>
  </g>

  <!-- leads -->
  <g transform="translate(550 125)">
    <rect class="table" width="420" height="650"/>
    <path class="head" d="M18 0h384a18 18 0 0 1 18 18v54H0V18A18 18 0 0 1 18 0z"/>
    <text x="24" y="45" class="th">leads</text>
    <text x="24" y="104" class="key">PK  id · BIGSERIAL</text>
    <text x="24" y="134" class="field">reference · unique</text>
    <text x="24" y="164" class="field">offer_type · offer_label · amount_chf</text>
    <text x="24" y="194" class="field">mama contact data</text>
    <text x="24" y="224" class="field">optional bestie contact data</text>
    <text x="24" y="254" class="field">privacy_consent · consent_at</text>
    <text x="24" y="284" class="field">status · assigned_to · callback_at</text>
    <text x="24" y="314" class="field">notes · lost_reason</text>
    <text x="24" y="344" class="key">FK  duplicate_of → leads.id</text>
    <text x="24" y="374" class="field">is_duplicate</text>
    <text x="24" y="404" class="field">UTM fields · fbclid · gclid</text>
    <text x="24" y="434" class="field">referrer · landing_url · page_variant</text>
    <text x="24" y="464" class="field">screen · user_agent · ip_hash</text>
    <text x="24" y="494" class="field">created_at · updated_at · archived_at</text>
    <line x1="24" y1="528" x2="396" y2="528" stroke="#e7d8d2"/>
    <text x="24" y="562" class="small">Core lead CRM table. Indexed for status, dates,</text>
    <text x="24" y="586" class="small">offer, source, email, phone and duplicate links.</text>
    <text x="24" y="620" class="small">CHECK constraints protect offer/status values</text>
    <text x="24" y="644" class="small">and duplicate relationship consistency.</text>
  </g>

  <!-- activities -->
  <g transform="translate(1080 155)">
    <rect class="table" width="300" height="335"/>
    <path class="head" d="M18 0h264a18 18 0 0 1 18 18v54H0V18A18 18 0 0 1 18 0z"/>
    <text x="24" y="45" class="th">lead_activities</text>
    <text x="24" y="104" class="key">PK  id · BIGSERIAL</text>
    <text x="24" y="138" class="key">FK  lead_id → leads.id</text>
    <text x="24" y="172" class="field">actor_type</text>
    <text x="24" y="206" class="key">FK  actor_id → admins.id</text>
    <text x="24" y="240" class="field">action</text>
    <text x="24" y="274" class="field">details_json · JSONB</text>
    <text x="24" y="308" class="field">created_at</text>
  </g>

  <!-- migrations -->
  <g transform="translate(1080 565)">
    <rect class="table" width="300" height="210"/>
    <path class="head" d="M18 0h264a18 18 0 0 1 18 18v54H0V18A18 18 0 0 1 18 0z"/>
    <text x="24" y="45" class="th">schema_migrations</text>
    <text x="24" y="105" class="key">PK  name</text>
    <text x="24" y="140" class="field">checksum · SHA-256</text>
    <text x="24" y="175" class="field">applied_at</text>
  </g>

  <!-- relations -->
  <path class="rel" d="M970 265 C1020 265 1030 265 1080 265"/>
  <text x="993" y="250" class="label">1 : N</text>
  <path class="rel2" d="M400 330 C470 330 490 365 550 365"/>
  <text x="450" y="315" class="label">admin actor</text>
  <path class="rel2" d="M760 125 C760 80 1010 80 1010 370 C1010 520 970 520 970 460"/>
  <text x="915" y="92" class="label">self-reference: duplicate_of</text>

  <text x="70" y="842" class="foot">Solid gold: primary one-to-many relation · Dashed rose: optional actor/self relation · All timestamps use TIMESTAMPTZ unless noted.</text>
</svg>
